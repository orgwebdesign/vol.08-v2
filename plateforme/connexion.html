<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Plateforme B2B VOL.08</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/plateforme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="plateforme-login-body">
    <div class="plateforme-login-box">
        <img src="../assets/img/logo%20Vol.08.svg" alt="VOL.08">
        <h1>Espace client B2B</h1>
        <p>Connectez-vous avec votre email professionnel</p>
        <div class="plateforme-login-error" id="loginError">Accès non autorisé. Votre compte n'a pas encore été validé.</div>
        <form id="clientLoginForm">
            <div class="form-group">
                <label>Email professionnel</label>
                <input type="email" id="clientEmail" required placeholder="vous@entreprise.com">
            </div>
            <button type="submit" class="btn btn-black">Accéder à la plateforme</button>
        </form>
        <div class="plateforme-login-help">
            <p>Pas encore de compte ? <a href="../b2b.html">Faire une demande d'accès</a></p>
        </div>
    </div>
    <script>
        document.getElementById('clientLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('clientEmail').value.trim();
            const clients = JSON.parse(localStorage.getItem('vol08_b2b_clients') || '[]');
            const client = clients.find(c => c.email === email && c.status === 'active');
            if (client) {
                sessionStorage.setItem('vol08_client_session', JSON.stringify({ email: client.email, nom: client.nom, prenom: client.prenom, entreprise: client.entreprise }));
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        });
    </script>
</body>
</html>
