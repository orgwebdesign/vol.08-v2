<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients — VOL.08 Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="admin-body">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-logo">
            <img src="../assets/img/logo%20Vol.08.svg" alt="VOL.08">
            <span>Administration</span>
        </div>
        <nav>
            <a href="index.html"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="demandes.html"><i data-lucide="file-text"></i> Demandes B2B</a>
            <a href="clients.html" class="active"><i data-lucide="users"></i> Clients</a>
            <a href="#" onclick="ADMIN_UTILS.logout()"><i data-lucide="log-out"></i> Déconnexion</a>
        </nav>
        <div class="admin-sidebar-footer">VOL.08 v1.0</div>
    </aside>
    <main class="admin-main">
        <div class="admin-header">
            <h1>Clients B2B</h1>
            <div class="admin-header-right"><span id="clientCount"></span></div>
        </div>
        <div class="admin-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Société</th>
                        <th>Contact</th>
                        <th>Statut</th>
                        <th>Pays</th>
                        <th>Validé le</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="clientsBody"></tbody>
            </table>
        </div>
    </main>
    <script src="../assets/js/admin.js"></script>
    <script>
        ADMIN_UTILS.requireAuth();

        function renderClients() {
            const clients = ADMIN_UTILS.getClients();
            document.getElementById('clientCount').textContent = clients.length + ' client' + (clients.length > 1 ? 's' : '');

            const tbody = document.getElementById('clientsBody');
            if (clients.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:3rem;">Aucun client validé</td></tr>';
                return;
            }
            tbody.innerHTML = clients.map(c => `
                <tr>
                    <td><strong>${c.entreprise}</strong></td>
                    <td>${c.prenom} ${c.nom}<br><span style="font-size:0.82rem;color:#999;">${c.email}</span></td>
                    <td><span class="admin-badge ${c.status}">${c.status === 'active' ? 'Actif' : 'Inactif'}</span></td>
                    <td>${c.pays || '—'}</td>
                    <td style="font-size:0.85rem;color:#999;">${ADMIN_UTILS.formatDate(c.dateValidation)}</td>
                    <td class="admin-actions">
                        <button class="admin-btn-sm red" onclick="removeClient('${c.email}')">Retirer</button>
                    </td>
                </tr>
            `).join('');
        }

        function removeClient(email) {
            if (!confirm('Retirer ce client de la plateforme ?')) return;
            let clients = ADMIN_UTILS.getClients();
            clients = clients.filter(c => c.email !== email);
            ADMIN_UTILS.saveClients(clients);

            let requests = ADMIN_UTILS.getRequests();
            const req = requests.find(r => r.email === email);
            if (req) { req.status = 'rejected'; ADMIN_UTILS.saveRequests(requests); }
            renderClients();
        }

        renderClients();
    </script>
</body>
</html>
